<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena Chasqui & Velasco</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
        body { color:white; background:black; overflow-x:hidden; }
        
        .video-bg { position:fixed; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:-2; }
        .overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:linear-gradient(rgba(0,0,0,0.7),rgba(0,50,0,0.8)); z-index:-1; }
        
        nav { position:fixed; top:0; width:100%; background:rgba(0,0,0,0.9); backdrop-filter:blur(10px); display:flex; justify-content:space-between; align-items:center; padding:10px 40px; z-index:1000; border-bottom: 1px solid rgba(255,215,0,0.2); }
        .nav-logo h1 { color:#FFD700; font-size: 22px; text-transform: uppercase; margin:0; }
        nav ul { list-style:none; display:flex; gap:15px; }
        nav a { color:white; text-decoration:none; font-weight:600; font-size: 13px; transition:0.3s; }
        nav a:hover { color:#00ff00; }

        /* --- LOADER CORRIGIDO (NOME COMPLETO) --- */
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; transition: 0.8s; }
        .bem-vindo { color: white; font-size: 18px; letter-spacing: 5px; opacity: 0; animation: fadeIn 1s forwards 0.5s; }
        
        /* Aumentado para 460px para garantir o 'O' final */
        .titulo-typing { 
            color: #FFD700; font-size: 32px; font-weight: 800; 
            white-space: nowrap; overflow: hidden; width: 0; 
            border-right: 3px solid #FFD700; 
            animation: typing 4s steps(25) forwards 1.5s; 
        }

        .campo-futebol { position: relative; width: 500px; height: 180px; margin-top: 20px; }
        .trave { position: absolute; right: 0; bottom: 0; width: 80px; height: 100px; border-left: 3px solid white; border-top: 3px solid white; }
        .boneco-branco { position: absolute; left: -100px; bottom: 10px; stroke: white; stroke-width: 3; fill: none; animation: corre-e-para 4s forwards 5.5s; }
        .bola { position: absolute; left: -60px; bottom: 15px; font-size: 20px; animation: bola-segue-jogador 4s forwards 5.5s, chuta-pro-gol 1s forwards 9.5s; }
        .goleiro { position: absolute; right: 40px; bottom: 10px; stroke: white; stroke-width: 3; fill: none; animation: goleiro-pula-errado 0.6s forwards 9.7s; }
        .texto-gol { position: absolute; width: 100%; text-align: center; top: -40px; color: #FFD700; font-size: 50px; font-weight: 900; opacity: 0; animation: fadeIn 0.3s forwards 10s; }
        .trofeu-animado { position: absolute; font-size: 25px; opacity: 0; animation: show-trofeu-mao 0.5s forwards 10.5s; }

        @keyframes typing { from { width: 0 } to { width: 460px } }
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes corre-e-para { 0% { left: -100px; } 100% { left: 120px; } }
        @keyframes bola-segue-jogador { 0% { left: -60px; } 100% { left: 160px; } }
        @keyframes chuta-pro-gol { to { left: 450px; bottom: 70px; transform: rotate(720deg); } }
        @keyframes goleiro-pula-errado { to { transform: translate(60px, 50px) rotate(90deg); opacity: 0.3; } }
        @keyframes show-trofeu-mao { to { opacity: 1; left: 135px; bottom: 60px; } }

        /* ABA VISUALIZAÇÃO (DONO) */
        #admin-views-box { display: none; position: fixed; top: 120px; left: 20px; background: #FFD700; color: black; padding: 12px 20px; border-radius: 10px; font-weight: 800; z-index: 5000; box-shadow: 0 0 20px gold; border: 2px solid black; }

        section { padding:80px 20px; text-align:center; }
        h2 { margin-bottom:40px; font-size:35px; color:#FFD700; text-transform: uppercase; }
        
        .galeria { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:15px; max-width: 1200px; margin: auto; }
        .galeria img { width:100%; border-radius:15px; aspect-ratio: 1/1; object-fit: cover; border: 1px solid rgba(255,215,0,0.3); }

        .calendar-container { background: rgba(0,0,0,0.9); padding: 20px; border-radius: 20px; max-width: 900px; margin: auto; border: 1px solid #FFD700; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 15px; }
        .day { background: rgba(255,255,255,0.1); min-height: 90px; padding: 8px; border-radius: 8px; font-size: 13px; text-align: left; cursor: pointer; }
        .event-tag { display: block; margin-top: 5px; background: #00ff00; color: black; padding: 2px 5px; border-radius: 4px; font-size: 10px; font-weight: bold; }

        .botao { padding:12px 25px; border-radius:40px; text-decoration:none; font-weight:600; cursor:pointer; display:inline-block; border:none; margin: 10px; }
    </style>
</head>
<body>

<div id="loader">
    <div class="bem-vindo">SEJA BEM-VINDO</div>
    <h1 class="titulo-typing">ARENA CHASQUI & VELASCO</h1>
    <div class="campo-futebol">
        <div class="texto-gol">GOOOOLLLLLL!!!</div>
        <div class="trofeu-animado">🏆</div>
        <div class="trave"></div>
        <svg class="boneco-branco" width="40" height="60" viewBox="0 0 40 60">
            <circle cx="20" cy="10" r="8" /><line x1="20" y1="18" x2="20" y2="40" />
            <line x1="20" y1="25" x2="5" y2="35" /><line x1="20" y1="25" x2="35" y2="35" />
            <line x1="20" y1="40" x2="10" y2="58" /><line x1="20" y1="40" x2="30" y2="58" />
        </svg>
        <div class="bola">⚽</div>
        <svg class="goleiro" width="40" height="60" viewBox="0 0 40 60">
            <circle cx="20" cy="10" r="8" /><line x1="20" y1="18" x2="20" y2="40" />
            <line x1="20" y1="20" x2="5" y2="5" /><line x1="20" y1="20" x2="35" y2="5" />
            <line x1="20" y1="40" x2="10" y2="58" /><line x1="20" y1="40" x2="30" y2="58" />
        </svg>
    </div>
</div>

<div id="admin-views-box"><i class="fas fa-eye"></i> ACESSOS TOTAIS: <span id="view-count">0</span></div>

<video class="video-bg" autoplay muted loop playsinline><source src="https://cdn.coverr.co/videos/coverr-football-stadium-1574/1080p.mp4" type="video/mp4"></video>
<div class="overlay"></div>

<nav>
    <div class="nav-logo"><h1>Arena Chasqui & Velasco</h1></div>
    <ul>
        <li><a href="#quadras">QUADRAS</a></li>
        <li><a href="#salao">SALÃO</a></li>
        <li><a href="#campeoes">CAMPEÕES</a></li>
        <li><a href="#agenda">AGENDA</a></li>
    </ul>
</nav>

<section id="quadras">
    <h2>Nossas Quadras</h2>
    <div class="galeria">
        <img src="https://via.placeholder.com/400x400?text=FOTO+QUADRA+1">
        <img src="https://via.placeholder.com/400x400?text=FOTO+QUADRA+2">
    </div>
</section>

<section id="salao">
    <h2>Salão de Festas</h2>
    <div class="galeria">
        <img src="https://via.placeholder.com/400x400?text=FOTO+SALAO+1">
        <img src="https://via.placeholder.com/400x400?text=FOTO+SALAO+2">
    </div>
</section>

<section id="campeoes">
    <h2>🏆 Galeria de Campeões</h2>
    <div class="galeria">
        <img src="https://via.placeholder.com/400x400?text=CAMPEAO+1">
        <img src="https://via.placeholder.com/400x400?text=CAMPEAO+2">
    </div>
</section>

<section id="agenda">
    <h2>Agenda do Salão</h2>
    <div class="calendar-container">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <button class="botao" id="btnPrev" style="background:#FFD700; color:black;">Anterior</button>
            <h3 id="monthDisplay">Mês</h3>
            <button class="botao" id="btnNext" style="background:#FFD700; color:black;">Próximo</button>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
        <button class="botao" id="btnAdmin" style="background: #444; color: white;">Acesso do Dono (MEV2000)</button>
    </div>
</section>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCE-hdY_R8PsRgqUDRi2TlA8y3kU84RC7s",
        authDomain: "arena-chasqui-velasco-6a21b.firebaseapp.com",
        databaseURL: "https://arena-chasqui-velasco-6a21b-default-rtdb.firebaseio.com",
        projectId: "arena-chasqui-velasco-6a21b",
        storageBucket: "arena-chasqui-velasco-6a21b.firebasestorage.app",
        messagingSenderId: "278041356492",
        appId: "1:278041356492:web:9467602b630af6aed57a69"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // CONTADOR VISUALIZAÇÕES
    const viewRef = ref(db, 'analytics/visitas');
    runTransaction(viewRef, (count) => (count || 0) + 1);
    onValue(viewRef, (snap) => document.getElementById('view-count').innerText = snap.val() || 0);

    // LOADER
    setTimeout(() => { document.getElementById('loader').style.opacity = '0'; setTimeout(() => document.getElementById('loader').style.display='none', 800); }, 13000);

    // LOGIN
    document.getElementById("btnAdmin").onclick = () => {
        if(prompt("Senha do Dono:") === "MEV2000"){
            sessionStorage.setItem('isArenaAdmin', 'true');
            location.reload();
        }
    };
    if(sessionStorage.getItem('isArenaAdmin') === 'true') document.getElementById('admin-views-box').style.display = 'block';

    // AGENDA EDITÁVEL
    let currentDate = new Date();
    let reservedEvents = {};
    const agendaRef = ref(db, 'agenda_salao');

    onValue(agendaRef, (snap) => {
        reservedEvents = snap.val() || {};
        renderCalendar();
    });

    function renderCalendar() {
        const grid = document.getElementById("calendarGrid");
        const monthDisplay = document.getElementById("monthDisplay");
        grid.innerHTML = "";
        const y = currentDate.getFullYear();
        const m = currentDate.getMonth();
        monthDisplay.innerText = currentDate.toLocaleString('pt-br', { month: 'long', year: 'numeric' }).toUpperCase();

        const firstDay = new Date(y, m, 1).getDay();
        const lastDate = new Date(y, m + 1, 0).getDate();

        for(let i=0; i<firstDay; i++) grid.appendChild(document.createElement("div"));

        for(let i=1; i<=lastDate; i++){
            const d = document.createElement("div");
            d.className = "day";
            const dateKey = `${y}-${m}-${i}`;
            d.innerHTML = `<strong>${i}</strong>`;
            if(reservedEvents[dateKey]) d.innerHTML += `<span class="event-tag">${reservedEvents[dateKey]}</span>`;

            d.onclick = () => {
                if(sessionStorage.getItem('isArenaAdmin') === 'true'){
                    const msg = prompt("Editar evento:", reservedEvents[dateKey] || "");
                    if(msg !== null) set(ref(db, 'agenda_salao/' + dateKey), msg);
                } else {
                    alert("Chame no WhatsApp para reservar!");
                }
            };
            grid.appendChild(d);
        }
    }
    document.getElementById("btnPrev").onclick = () => { currentDate.setMonth(currentDate.getMonth()-1); renderCalendar(); };
    document.getElementById("btnNext").onclick = () => { currentDate.setMonth(currentDate.getMonth()+1); renderCalendar(); };
</script>

</body>
</html>
